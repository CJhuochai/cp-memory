<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">CP Memory governance loop</title>
  <desc id="desc">Memory extraction creates reviewable candidates, reminders surface them, users confirm or correct them, and weekly maintenance performs safe cleanup.</desc>
  <rect width="920" height="320" rx="28" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <text x="460" y="42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Reviewable Memory Governance</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <g>
      <rect x="44" y="108" width="142" height="86" rx="18" fill="#ccfbf1" stroke="#14b8a6"/>
      <text x="115" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Extract</text>
      <text x="115" y="168" text-anchor="middle" font-size="12" fill="#334155">explicit signals</text>
    </g>
    <g>
      <rect x="226" y="108" width="142" height="86" rx="18" fill="#ffffff" stroke="#14b8a6"/>
      <text x="297" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Queue</text>
      <text x="297" y="168" text-anchor="middle" font-size="12" fill="#334155">needs review</text>
    </g>
    <g>
      <rect x="408" y="108" width="142" height="86" rx="18" fill="#ccfbf1" stroke="#14b8a6"/>
      <text x="479" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Remind</text>
      <text x="479" y="168" text-anchor="middle" font-size="12" fill="#334155">on new session</text>
    </g>
    <g>
      <rect x="590" y="108" width="142" height="86" rx="18" fill="#ffffff" stroke="#14b8a6"/>
      <text x="661" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Review</text>
      <text x="661" y="168" text-anchor="middle" font-size="12" fill="#334155">confirm/correct</text>
    </g>
    <g>
      <rect x="772" y="108" width="104" height="86" rx="18" fill="#ccfbf1" stroke="#14b8a6"/>
      <text x="824" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Maintain</text>
      <text x="824" y="168" text-anchor="middle" font-size="12" fill="#334155">safe expiry</text>
    </g>
  </g>
  <line x1="186" y1="151" x2="218" y2="151" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="368" y1="151" x2="400" y2="151" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="550" y1="151" x2="582" y2="151" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="732" y1="151" x2="764" y2="151" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 812 214 C 680 278 250 278 112 214" fill="none" stroke="#0f766e" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="460" y="260" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#334155">No silent hard delete for long-term memory. Wrong, stale, and scoped states stay auditable.</text>
</svg>
